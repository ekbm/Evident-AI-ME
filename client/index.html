    <script>
      // Theme detection with user preference support - runs before first paint
      (function() {
        var darkBg = '#090e1a';  // Dark mode background (matches --background: 222 47% 7%)
        var lightBg = '#eceff2'; // Light mode background (matches --background: 215 20% 94%)
        var darkThemeColor = '#090e1a';
        var lightThemeColor = '#eceff2';
        
        function applyTheme(isDark) {
          var colorSchemeMeta = document.querySelector('meta[name="color-scheme"]');
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = darkBg;
            document.documentElement.style.colorScheme = 'dark';
            document.body.style.backgroundColor = darkBg;
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', darkThemeColor);
            if (colorSchemeMeta) colorSchemeMeta.setAttribute('content', 'dark');
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = lightBg;
            document.documentElement.style.colorScheme = 'light';
            document.body.style.backgroundColor = lightBg;
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', lightThemeColor);
            if (colorSchemeMeta) colorSchemeMeta.setAttribute('content', 'light');
          }
        }
        
        var savedTheme = localStorage.getItem('evidentTheme');
        var isDark = false;
        
        if (savedTheme === 'dark') {
          isDark = true;
        } else if (savedTheme === 'light') {
          isDark = false;
        } else {
          // Default to dark mode on large screens (desktop), light on mobile
          isDark = window.innerWidth >= 1024;
        }
        
        applyTheme(isDark);
        
        // Listen for system theme changes (only applies in auto mode)
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
          var currentTheme = localStorage.getItem('evidentTheme');
          if (!currentTheme || currentTheme === 'auto') {
            applyTheme(e.matches);
          }
        });
      })();
    </script>
    <div id="root">
      <!-- This loading indicator shows before React mounts -->
      <div id="initial-loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif;">
        <div class="loader-text" style="font-size: 24px; font-weight: bold; margin-bottom: 16px;">Evident</div>
        <div class="loader-subtext" style="opacity: 0.7;">Loading...</div>

    <style>

      #initial-loader { color: #1e293b; }
    </style>
    </div>
    <!-- Global error handler to catch errors before React mounts -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        console.error('[GlobalError]', message, source, lineno, colno, error);
        var root = document.getElementById('root');
        if (root && !root.innerHTML.trim()) {
          root.innerHTML = '<div style="padding: 20px; font-family: sans-serif; color: #333;">' +
            '<h2 style="color: #dc2626;">App Error</h2>' +
            '<p><strong>Message:</strong> ' + message + '</p>' +
            '<p><strong>Source:</strong> ' + source + '</p>' +
            '<p><strong>Line:</strong> ' + lineno + '</p>' +
            '<button onclick="location.reload()" style="padding: 10px 20px; margin-top: 10px;">Reload</button>' +
            '</div>';
        }
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        console.error('[UnhandledRejection]', event.reason);
        var root = document.getElementById('root');
        if (root && !root.innerHTML.trim()) {
          root.innerHTML = '<div style="padding: 20px; font-family: sans-serif; color: #333;">' +
            '<h2 style="color: #dc2626;">App Error</h2>' +
            '<p><strong>Promise Rejected:</strong> ' + (event.reason?.message || event.reason) + '</p>' +
            '<button onclick="location.reload()" style="padding: 10px 20px; margin-top: 10px;">Reload</button>' +
            '</div>';
        }
      });
    </script>
